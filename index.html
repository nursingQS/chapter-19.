<script>
    // Chapter 19: Management of Patients with Chest and Lower Respiratory Tract Disorders – 41 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. A perioperative nurse is caring for a postoperative client. The client has a shallow respiratory pattern and is reluctant to cough or to begin mobilizing. The nurse should address the client's increased risk for what complication?",
            options: [
                "A. Acute respiratory distress syndrome (ARDS)",
                "B. Atelectasis",
                "C. Aspiration",
                "D. Pulmonary embolism"
            ],
            correct: 1, // B
            rationale: "A shallow, monotonous respiratory pattern coupled with immobility places the client at an increased risk of developing atelectasis. These specific factors are less likely to result in pulmonary embolism or aspiration. ARDS involves an exaggerated inflammatory response and does not normally result from factors such as immobility and shallow breathing. (PTS:1 REF:p.527)"
        },
        {
            id: 2,
            question: "2. A critical-care nurse is caring for a client diagnosed with pneumonia as a surgical complication. The nurse's assessment reveals that the client has an increased work of breathing due to copious tracheobronchial secretions. What should the nurse encourage the client to do?",
            options: [
                "A. Increase oral fluids unless contraindicated.",
                "B. Call the nurse for oral suctioning, as needed.",
                "C. Lie in a low Fowler or supine position.",
                "D. Increase activity."
            ],
            correct: 0, // A
            rationale: "The nurse should encourage hydration because adequate hydration thins and loosens pulmonary secretions. Oral suctioning is not sufficiently deep to remove tracheobronchial secretions. The client should have the head of the bed raised, and rest should be promoted to avoid exacerbation of symptoms. (PTS:1 REF:p.539)"
        },
        {
            id: 3,
            question: "3. The nurse is caring for a client who has been in a motor vehicle accident and is suspected of having developed pleurisy. Which assessment finding would best corroborate this diagnosis?",
            options: [
                "A. The client is experiencing painless hemoptysis.",
                "B. The client's arterial blood gases (ABGs) are normal, but the client demonstrates increased work of breathing.",
                "C. The client's oxygen saturation level is below 88%, but the client denies shortness of breath.",
                "D. The client's pain intensifies when the client coughs or takes a deep breath."
            ],
            correct: 3, // D
            rationale: "The key characteristic of pleuritic pain is its relationship to respiratory movement. Taking a deep breath, coughing, or sneezing worsens the pain. The client's ABGs would most likely be abnormal, and shortness of breath would be expected. Painless hemoptysis is not characteristic of pleurisy. (PTS:1 REF:p.553)"
        },
        {
            id: 4,
            question: "4. The nurse caring for a client recently diagnosed with lung disease encourages the client not to smoke. What is the primary rationale behind this nursing action?",
            options: [
                "A. Smoking decreases the amount of mucus production.",
                "B. Smoke particles compete for binding sites on hemoglobin.",
                "C. Smoking causes atrophy of the alveoli.",
                "D. Smoking damages the ciliary cleansing mechanism."
            ],
            correct: 3, // D
            rationale: "In addition to irritating the mucous cells of the bronchi and inhibiting the function of alveolar macrophage (scavenger) cells, smoking damages the ciliary cleansing mechanism of the respiratory tract. Smoking also increases the amount of mucus production and distends the alveoli in the lungs. It reduces the oxygen-carrying capacity of hemoglobin, but not by directly competing for binding sites. (PTS:1 REF:p.544)"
        },
        {
            id: 5,
            question: "5. The nurse is caring for a client who is scheduled for a lobectomy for lung cancer. While assisting with a subclavian vein central line insertion, the nurse notes that the client's oxygen saturation is rapidly dropping. The client reports shortness of breath and becomes tachypneic. The nurse suspects a pneumothorax has developed. Which further assessment finding would support the presence of a pneumothorax?",
            options: [
                "A. Diminished or absent breath sounds on the affected side",
                "B. Paradoxical chest wall movement with respirations",
                "C. Sudden loss of consciousness",
                "D. Muffled heart sounds"
            ],
            correct: 0, // A
            rationale: "In the case of a simple pneumothorax, auscultating the breath sounds will reveal absent or diminished breath sounds on the affected side. Paradoxical chest wall movements occur in flail chest conditions. Sudden loss of consciousness does not typically occur. Muffled or distant heart sounds occur in pericardial tamponade. (PTS:1 REF:p.581)"
        },
        {
            id: 6,
            question: "6. The nurse in the intensive care unit is caring for a client with pulmonary hypertension. Which finding should the nurse expect to assess?",
            options: [
                "A. Pulmonary artery pressure greater than 20 mm Hg",
                "B. Flat neck veins",
                "C. Dyspnea at rest",
                "D. Enlarged spleen"
            ],
            correct: 2, // C
            rationale: "The main symptom in pulmonary hypertension is dyspnea. At first dyspnea occurs with exertion, then eventually at rest. A client with pulmonary hypertension will have a pulmonary artery pressure greater than 25 mm Hg at rest and distended neck veins secondary to right-sided heart failure. The nurse would expect the liver, not the spleen, to be enlarged secondary to engorgement in pulmonary hypertension. (PTS:1 REF:p.575)"
        },
        {
            id: 7,
            question: "7. A new employee asks the occupational health nurse about measures to prevent inhalation exposure to toxic substances. What should the nurse recommend?",
            options: [
                "A. 'Position a fan blowing toxic substances away from you to prevent you from being exposed.'",
                "B. 'Wear protective attire and devices when working with a toxic substance.'",
                "C. 'Make sure that you keep your immunizations up to date to prevent respiratory diseases resulting from toxins.'",
                "D. 'Always wear a disposable paper face mask when you are working with inhalable toxins.'"
            ],
            correct: 1, // B
            rationale: "When working with toxic substances, the employee must wear or use protective devices such as face masks, hoods, or industrial respirators. Immunizations do not confer protection from toxins and a paper mask is normally insufficient protection. Never position a fan directly blowing on the toxic substance as it will disperse the fumes throughout the area. (PTS:1 REF:p.577)"
        },
        {
            id: 8,
            question: "8. An x-ray of a trauma client reveals rib fractures, and the client is diagnosed with a small flail chest injury. Which intervention should the nurse include in the client's plan of care?",
            options: [
                "A. Initiate chest physiotherapy.",
                "B. Immobilize the ribs with an abdominal binder.",
                "C. Prepare the client for surgery.",
                "D. Immediately sedate and intubate the client."
            ],
            correct: 0, // A
            rationale: "As with rib fracture, treatment of flail chest is usually supportive. Management includes chest physiotherapy and controlling pain. Intubation is required only for severe flail chest injuries, not small flail chest injuries, and surgery is required only in rare circumstances to stabilize the flail segment. Immobilization of the ribs with an abdominal binder is not necessary for a small flail chest injury. (PTS:1 REF:p.591)"
        },
        {
            id: 9,
            question: "9. A client has tested positive for tuberculosis (TB). While providing client teaching, which information should the nurse prioritize?",
            options: [
                "A. The importance of adhering closely to the prescribed medication regimen",
                "B. The disease being a lifelong, chronic condition that will affect activities of daily living (ADLs)",
                "C. TB being self-limiting but taking up to 2 years to resolve",
                "D. The need to work closely with the occupational and physical therapists"
            ],
            correct: 0, // A
            rationale: "Successful treatment of TB is highly dependent on careful adherence to the medication regimen. The disease is not self-limiting; occupational and physical therapy are not necessarily indicated. TB is curable. (PTS:1 REF:p.550)"
        },
        {
            id: 10,
            question: "10. The nurse is assessing an adult client following a motor vehicle accident. The nurse observes that the client has an increased use of accessory muscles and is reporting chest pain and shortness of breath. The nurse should recognize the possibility of which condition?",
            options: [
                "A. Pneumothorax",
                "B. Cardiac ischemia",
                "C. Acute bronchitis",
                "D. Aspiration"
            ],
            correct: 0, // A
            rationale: "If the pneumothorax is large and the lung collapses totally, acute respiratory distress occurs. The client is anxious, has dyspnea and air hunger, has increased use of the accessory muscles, and may develop central cyanosis from severe hypoxemia. These symptoms are not definitive of pneumothorax, but because of the client's recent trauma they are inconsistent with cardiac ischemia, bronchitis, and aspiration. (PTS:1 REF:p.594)"
        },
        {
            id: 11,
            question: "11. The nurse is caring for a client suspected of having acute respiratory distress syndrome (ARDS). What is the most likely diagnostic test ordered in the early stages of this disease to differentiate the client's symptoms from those of a cardiac etiology?",
            options: [
                "A. Carboxyhemoglobin level",
                "B. Brain natriuretic peptide (BNP) level",
                "C. C-reactive protein (CRP) level",
                "D. Complete blood count"
            ],
            correct: 1, // B
            rationale: "Common diagnostic tests performed for clients with potential ARDS include plasma brain natriuretic peptide (BNP) levels, echocardiography, and pulmonary artery catheterization. The BNP level is helpful in distinguishing ARDS from cardiogenic pulmonary edema. The carboxyhemoglobin level will be increased in a client with an inhalation injury, which commonly progresses into ARDS. CRP and CBC levels do not help differentiate from a cardiac problem. (PTS:1 REF:p.572)"
        },
        {
            id: 12,
            question: "12. The nurse is caring for a client at risk for atelectasis. The nurse implements a first-line measure to prevent atelectasis development in the client. What is an example of a first-line measure to minimize atelectasis?",
            options: [
                "A. Incentive spirometry",
                "B. Intermittent positive-pressure breathing (IPPB)",
                "C. Positive end-expiratory pressure (PEEP)",
                "D. Bronchoscopy"
            ],
            correct: 0, // A
            rationale: "Strategies to prevent atelectasis, which include frequent turning, early ambulation, lung-volume expansion maneuvers (deep breathing exercises, incentive spirometry), and coughing, serve as the first-line measures to minimize or treat atelectasis by improving ventilation. In clients who do not respond to first-line measures or who cannot perform deep-breathing exercises, other treatments such as positive end-expiratory pressure (PEEP), continuous or intermittent positive-pressure breathing (IPPB), or bronchoscopy may be used. (PTS:1 REF:p.530)"
        },
        {
            id: 13,
            question: "13. While planning a client's care, the nurse identifies nursing actions to minimize the client's pleuritic pain. Which intervention should the nurse include in the plan of care?",
            options: [
                "A. Administer an analgesic before coughing and deep breathing.",
                "B. Ambulate the client at least three times daily.",
                "C. Arrange for a soft-textured diet and increased fluid intake.",
                "D. Encourage the client to speak as little as possible."
            ],
            correct: 0, // A
            rationale: "The key characteristic of pleuritic pain is its relationship to respiratory movement. Taking a deep breath, coughing, or sneezing worsens the pain. Because deep breathing and coughing prevent atelectasis, the client should be given an analgesic prior to performing these respiratory exercises. A soft diet is not necessarily indicated, and there is no need for the client to avoid speaking. Ambulation has multiple benefits, but pain management is not among them. (PTS:1 REF:p.554)"
        },
        {
            id: 14,
            question: "14. The perioperative nurse is writing a care plan for a client who has returned from surgery 2 hours ago. Which measure should the nurse implement to most decrease the client's risk of developing pulmonary emboli (PE)?",
            options: [
                "A. Early ambulation",
                "B. Increased dietary intake of protein",
                "C. Maintaining the client in a supine position",
                "D. Administering aspirin with warfarin"
            ],
            correct: 0, // A
            rationale: "For clients at risk for PE, the most effective approach for prevention is to prevent deep vein thrombosis. Active leg exercises to avoid venous stasis, early ambulation, and use of elastic compression stockings are general preventive measures. The client does not require increased dietary intake of protein directly related to prevention of PE, although it will assist in wound healing during the postoperative period. The client should not be maintained in one position, but frequently repositioned unless contraindicated by the surgical procedure. Aspirin should never be given with warfarin because it will increase the client's risk for bleeding. (PTS:1 REF:p.535)"
        },
        {
            id: 15,
            question: "15. The school nurse is presenting a class on smoking cessation at the local high school. A participant in the class asks the nurse about the risk of lung cancer in those who smoke. What response related to risk for lung cancer in smokers is most accurate?",
            options: [
                "A. 'The younger you are when you start smoking, the higher your risk of lung cancer.'",
                "B. 'The risk for lung cancer never decreases once you have smoked, which is why smokers need annual chest x-rays.'",
                "C. 'The risk for lung cancer is determined mostly by what type of cigarettes you smoke.'",
                "D. 'The risk for lung cancer depends primarily on the other risk factors for cancer that you have.'"
            ],
            correct: 0, // A
            rationale: "Risk is determined by the pack-year history (number of packs of cigarettes used each day, multiplied by the number of years smoked), the age of initiation of smoking, the depth of inhalation, and the tar and nicotine levels in the cigarettes smoked. The younger a person is when he or she starts smoking, the greater the risk of developing lung cancer. Risk declines after smoking cessation. The type of cigarettes is a significant variable, but this is not the most important factor. (PTS:1 REF:p.578)"
        },
        {
            id: 16,
            question: "16. The nurse is assessing a client who has a 35 pack-year history of cigarette smoking. In light of this known risk factor for lung cancer, which statement by the client should prompt the nurse to refer the client for further assessment?",
            options: [
                "A. 'Lately, I have this cough that just never seems to go away.'",
                "B. 'I find that I don't have nearly the stamina that I used to.'",
                "C. 'I seem to get nearly every cold and flu that goes around my workplace.'",
                "D. 'I never used to have any allergies, but now I think I'm developing allergies to dust and pet hair.'"

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
